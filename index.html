<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Portafoglio"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="Portafoglio"/>
<meta name="theme-color" content="#1c1c1b" media="(prefers-color-scheme: dark)"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
<meta name="description" content="Gestione finanziaria personale"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
<title>Il mio portafoglio</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeece8;
  --txt:#1a1a1a;--txt2:#6b6b6b;--txt3:#9d9b96;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --green:#1d9e75;--green-bg:#e1f5ee;--green-txt:#085041;
  --red:#e24b4a;--red-bg:#fcebeb;--red-txt:#501313;
  --blue:#378add;--blue-bg:#e6f1fb;--blue-txt:#042c53;
  --amber:#ba7517;--amber-bg:#faeeda;--amber-txt:#412402;
  --pink:#d4537e;--pink-bg:#fbeaf0;--pink-txt:#4b1528;
  --r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1b;--bg2:#262624;--bg3:#2e2e2c;
    --txt:#e8e6e1;--txt2:#a09e99;--txt3:#6b6966;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --green:#5dcaa5;--green-bg:#04342c;--green-txt:#9fe1cb;
    --red:#f09595;--red-bg:#501313;--red-txt:#f7c1c1;
    --blue:#85b7eb;--blue-bg:#042c53;--blue-txt:#b5d4f4;
    --amber:#ef9f27;--amber-bg:#412402;--amber-txt:#fac775;
    --pink:#ed93b1;--pink-bg:#4b1528;--pink-txt:#f4c0d1;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--txt);font-size:15px;min-height:100vh}
#app{max-width:900px;margin:0 auto;padding:16px 12px 80px}
h1{font-size:22px;font-weight:600;color:var(--txt)}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.mnav{display:flex;align-items:center;gap:8px}
.mnav button{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 11px;cursor:pointer;font-size:13px;color:var(--txt2)}
.mnav button:hover{background:var(--bg2)}
.mlbl{font-size:14px;font-weight:600;color:var(--txt);min-width:130px;text-align:center}
.net-bar{background:var(--bg2);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border:1px solid var(--border)}
.net-main .lbl{font-size:12px;color:var(--txt3);margin-bottom:2px}
.net-main .val{font-size:30px;font-weight:700;color:var(--txt)}
.net-items{display:flex;gap:20px;flex-wrap:wrap}
.net-items span{font-size:13px;color:var(--txt2)}
.net-items strong{color:var(--txt)}
.tabs-wrap{margin-bottom:16px;border-bottom:1px solid var(--border)}
.tabs{display:flex;flex-wrap:wrap}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--txt2);background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-1px;flex-shrink:0;font-weight:500}
.tab.active{color:var(--txt);border-bottom-color:var(--txt);font-weight:600}
.tab:hover{color:var(--txt)}
.cards{display:grid;gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border-radius:var(--r-md);padding:12px 14px;border:1px solid var(--border)}
.card .lbl{font-size:11px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:20px;font-weight:600}
.sec{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:12px}
.stitle{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.frow{display:grid;gap:8px;align-items:end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:var(--txt3)}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 10px;font-size:14px;color:var(--txt);width:100%;font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,0.15)}
input[type=range]{padding:4px 0;background:none;border:none;box-shadow:none;accent-color:var(--blue)}
.btn{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);padding:8px 14px;cursor:pointer;font-size:13px;color:var(--txt);white-space:nowrap;font-family:inherit;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn:active{transform:scale(.97)}
.bok{background:var(--green-bg);border-color:var(--green);color:var(--green-txt)}
.binfo{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-txt)}
.bwarn{background:var(--amber-bg);border-color:var(--amber);color:var(--amber-txt)}
.bdanger{background:var(--red-bg);border-color:var(--red);color:var(--red-txt)}
.bpink{background:var(--pink-bg);border-color:var(--pink);color:var(--pink-txt)}
.tx-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);background:var(--bg2);margin-bottom:6px;border:1px solid var(--border)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.d-in{background:var(--green)} .d-out{background:var(--red)} .d-inv{background:var(--blue)} .d-rec{background:var(--amber)} .d-tr{background:var(--txt3)} .d-jt{background:var(--pink)}
.del{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;padding:2px 6px;border-radius:4px;opacity:.5;font-family:inherit}
.del:hover{opacity:1;color:var(--red)}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;margin-left:5px;font-weight:500}
.tag-inv{background:var(--blue-bg);color:var(--blue-txt)}
.tag-rec{background:var(--amber-bg);color:var(--amber-txt)}
.tag-tr{background:var(--bg2);color:var(--txt2);border:1px solid var(--border)}
.tag-jt{background:var(--pink-bg);color:var(--pink-txt)}
.cpos{color:var(--green)} .cneg{color:var(--red)} .cinv{color:var(--blue)} .cwarn{color:var(--amber)} .cpink{color:var(--pink)} .cmut{color:var(--txt3)}
.empty{text-align:center;color:var(--txt3);font-size:13px;padding:28px}
.abox{border-radius:var(--r-lg);padding:13px 16px;margin-bottom:10px;font-size:13px;line-height:1.6;border:1px solid}
.abox.success{background:var(--green-bg);border-color:var(--green);color:var(--green-txt)}
.abox.danger{background:var(--red-bg);border-color:var(--red);color:var(--red-txt)}
.abox.warning{background:var(--amber-bg);border-color:var(--amber);color:var(--amber-txt)}
.abox.info{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-txt)}
.pbar{height:8px;border-radius:4px;background:var(--bg3);margin:6px 0;overflow:hidden;border:1px solid var(--border)}
.pfill{height:100%;border-radius:4px;transition:width .5s}
.f-ok{background:var(--green)} .f-warn{background:var(--amber)} .f-danger{background:var(--red)} .f-info{background:var(--blue)} .f-pink{background:var(--pink)}
.goal-card{border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;background:var(--bg)}
.goal-card.done{border-color:var(--green);background:var(--green-bg)}
.goal-card.urgent{border-color:var(--red)}
.inv-card{border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin-bottom:8px;background:var(--bg)}
.saving-plan{border:1px solid var(--blue);border-radius:var(--r-lg);padding:14px;background:var(--blue-bg);margin-bottom:8px}
.cal-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-md);border:1px solid var(--border);margin-bottom:8px;background:var(--bg)}
.mbadge{min-width:42px;height:42px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1.2;flex-shrink:0}
.mb-warn{background:var(--amber-bg);color:var(--amber-txt)}
.mb-info{background:var(--blue-bg);color:var(--blue-txt)}
.mb-neu{background:var(--bg2);color:var(--txt2)}
.acc-card{border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;background:var(--bg);cursor:pointer}
.acc-card:hover{border-color:var(--border2)}
.acc-card.joint-card{border-color:var(--pink);background:var(--pink-bg)}
.jt-header{background:var(--pink-bg);border:1px solid var(--pink);border-radius:var(--r-md);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sim-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sim-row label{font-size:13px;color:var(--txt2);min-width:170px}
.sim-row input[type=range]{flex:1;min-width:100px}
.sim-val{font-size:14px;font-weight:600;min-width:72px;text-align:right;color:var(--txt)}
.sim-result{background:var(--bg2);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:12px;border:1px solid var(--border)}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;overflow-x:auto;padding-bottom:2px}
.filter-chip{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--txt2);white-space:nowrap;font-family:inherit;font-weight:500}
.filter-chip.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-txt)}
.filter-chip.active-pink{border-color:var(--pink);background:var(--pink-bg);color:var(--pink-txt)}
.badge{display:inline-block;background:var(--red-bg);color:var(--red-txt);font-size:11px;padding:1px 6px;border-radius:10px;margin-left:4px;font-weight:600}
.badge-ok{background:var(--green-bg);color:var(--green-txt)}
.chart-wrap{height:280px;position:relative;margin-top:8px}
.save-indicator{position:fixed;bottom:16px;right:16px;background:var(--green-bg);color:var(--green-txt);border:1px solid var(--green);border-radius:var(--r-lg);padding:8px 14px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.save-indicator.show{opacity:1}
@media(max-width:600px){
  #app{padding:12px 8px 90px}
  .frow{grid-template-columns:1fr !important}
  .cards{grid-template-columns:1fr 1fr !important}
  .net-bar{flex-direction:column;gap:8px}
  .chart-wrap{height:220px}
  h1{font-size:19px}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="save-indicator" id="save-ind">✓ Salvato</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const MO=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const MS=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const CATS={income:['Stipendio','Freelance','Dividendi','Bonus','Rimborso','Altro'],expense:['Affitto','Spesa','Bollette','Trasporti','Ristorazione','Abbonamenti','Salute','Svago','Vestiario','Altro'],invest:['ETF','Azioni','Obbligazioni','Criptovalute','Fondo','Altro']};
const RECURS=[{v:'once',l:'Una tantum'},{v:'monthly',l:'Mensile'},{v:'3months',l:'Ogni 3 mesi'},{v:'6months',l:'Ogni 6 mesi'},{v:'yearly',l:'Annuale'}];
const GOAL_TYPES=[{v:'save',l:'Risparmio'},{v:'invest',l:'Investimento'},{v:'buy',l:'Acquisto'},{v:'debt',l:'Saldo debito'}];
const ACC_TYPES=[{v:'checking',l:'Conto corrente',icon:'🏦'},{v:'savings',l:'Conto deposito',icon:'🏧'},{v:'investment',l:'Conto titoli',icon:'📈'},{v:'joint',l:'Cointestato',icon:'👫'},{v:'cash',l:'Contanti',icon:'💵'},{v:'crypto',l:'Crypto wallet',icon:'🔐'},{v:'other',l:'Altro',icon:'🗂️'}];

const now=new Date();
function pad(n){return String(n).padStart(2,'0')}
function fmt(n){const v=Math.abs(n).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:2});return(n<0?'-':'')+'\u20ac'+v}
function daysLeft(s){return Math.ceil((new Date(s)-now)/(864e5))}
function monthsLeft(s){const d=new Date(s);return Math.max(0,(d.getFullYear()-now.getFullYear())*12+(d.getMonth()-now.getMonth()))}

// ── DATI DEFAULT ──
const DEFAULT_DATA={
  viewYear:now.getFullYear(), viewMonth:now.getMonth(), activeTab:'overview', filterAccount:'all',
  accounts:[
    {id:1,name:'Conto Corrente',type:'checking',icon:'🏦',color:'info',initialBalance:2400,note:'Conto principale stipendio'},
    {id:2,name:'Conto Deposito',type:'savings',icon:'🏧',color:'success',initialBalance:5000,note:'Fondo emergenza'},
    {id:3,name:'Conto Investimenti',type:'investment',icon:'📈',color:'warning',initialBalance:650,note:'ETF'},
    {id:4,name:'Conto Cointestato',type:'joint',icon:'👫',color:'pink',initialBalance:800,note:'Spese comuni',isJoint:true,partnerName:'Partner',myMonthly:200,partnerMonthly:200}
  ],
  transactions:[
  ],
  recurring:[
  ],
  goals:[
  ],
  investments:[
  ],
  sim:{monthly:200,rate:7,years:20},
  nextId:1,
  settings:{
    tabs:{overview:true,movements:true,joint:true,transfer:true,chart:true,simulator:true,alerts:true,goals:true,calendar:true,investments:true,accounts:true,projection:true},
    autoRegister:true
  },
  autoRegistered:[],
  txForm:{type:'income',category:'Stipendio',desc:'',amount:'',accountId:1},
  trForm:{fromId:1,toId:2,amount:'',desc:'Trasferimento'},
  accForm:{name:'',type:'checking',initialBalance:'',note:'',isJoint:false,partnerName:'',myMonthly:200,partnerMonthly:200},
  recForm:{name:'',amount:'',month:now.getMonth(),recur:'yearly',category:'Trasporti',accountId:null},
  goalForm:{name:'',type:'save',target:'',deadline:`${now.getFullYear()+1}-${pad(now.getMonth()+1)}-01`,notes:'',accountId:null},
  invForm:{name:'',monthly:'',val:'',accountId:3},
  editInvId:null,editInvVal:'',editDivId:null,divAmt:''
};

// ── PERSISTENZA ──
function loadData(){
  try{
    const saved=localStorage.getItem('pfv4');
    if(saved){
      const parsed=JSON.parse(saved);
      return Object.assign({},DEFAULT_DATA,parsed);
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
let saveTimer=null;
function saveData(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      const toSave={...S};
      delete toSave.txForm; delete toSave.trForm; delete toSave.accForm;
      delete toSave.recForm; delete toSave.goalForm; delete toSave.invForm;
      delete toSave.editInvId; delete toSave.editInvVal; delete toSave.editDivId; delete toSave.divAmt;
      toSave.viewYear=S.viewYear; toSave.viewMonth=S.viewMonth;
      localStorage.setItem('pfv4',JSON.stringify(toSave));
      const ind=document.getElementById('save-ind');
      if(ind){ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),1800)}
    }catch(e){}
  },600);
}

// Se ?reset nell'URL, svuota localStorage e riparte pulito
if(window.location.search.includes('reset')){
  try{localStorage.clear();sessionStorage.clear();}catch(e){}
  history.replaceState(null,'',window.location.pathname);
}
let S=loadData();
// Assicura che i campi nuovi esistano anche su dati salvati vecchi
if(!S.settings){S.settings={tabs:{overview:true,movements:true,joint:true,transfer:true,chart:true,simulator:true,alerts:true,goals:true,calendar:true,investments:true,accounts:true,projection:true},autoRegister:true};}
if(!S.settings.tabs)S.settings.tabs={overview:true,movements:true,joint:true,transfer:true,chart:true,simulator:true,alerts:true,goals:true,calendar:true,investments:true,accounts:true,projection:true};
if(S.settings.tabs.projection===undefined)S.settings.tabs.projection=true;
if(!S.autoRegistered)S.autoRegistered=[];

// ── HELPERS ──
function accById(id){return S.accounts.find(a=>a.id===id)}
function accBalance(accId){
  const acc=accById(accId);if(!acc)return 0;
  let bal=acc.initialBalance||0;
  S.transactions.forEach(t=>{
    if(t.type==='transfer'){if(t.accountId===accId)bal-=t.amount;if(t.toAccountId===accId)bal+=t.amount;}
    else{if(t.accountId!==accId)return;if(t.type==='income')bal+=t.amount;else if(t.type==='expense'||t.type==='invest')bal-=t.amount;}
  });
  return bal;
}
function netWorth(){return S.accounts.reduce((s,a)=>s+accBalance(a.id),0)}
function monthTxs(y,m,accId){
  return S.transactions.filter(t=>{
    const d=new Date(t.date);
    if(d.getFullYear()!==y||d.getMonth()!==m)return false;
    if(accId&&accId!=='all')return t.accountId===parseInt(accId)||(t.type==='transfer'&&t.toAccountId===parseInt(accId));
    return true;
  });
}
function calcMonth(y,m,accId){
  let inc=0,exp=0,inv=0;
  S.transactions.forEach(t=>{
    const d=new Date(t.date);
    if(d.getFullYear()!==y||d.getMonth()!==m)return;
    if(t.type==='transfer')return;
    if(accId&&accId!=='all'&&t.accountId!==parseInt(accId))return;
    if(t.type==='income')inc+=t.amount;
    else if(t.type==='expense')exp+=t.amount;
    else if(t.type==='invest')inv+=t.amount;
  });
  return{inc,exp,inv,bal:inc-exp};
}
function last12Months(){
  const res=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const s=calcMonth(d.getFullYear(),d.getMonth(),null);
    res.push({label:MS[d.getMonth()]+"'"+String(d.getFullYear()).slice(2),y:d.getFullYear(),m:d.getMonth(),...s});
  }
  return res;
}
function getRecurForMonth(y,m){
  return S.recurring.filter(r=>{
    if(r.recur==='monthly')return true;
    if(r.recur==='once')return r.month===m;
    if(r.recur==='yearly')return r.month===m;
    const iv=r.recur==='6months'?6:3;
    return((m-r.month)%iv+iv)%iv===0;
  });
}
function futurePlans(n=12){
  const items=[];
  for(let i=1;i<=n;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);getRecurForMonth(d.getFullYear(),d.getMonth()).forEach(r=>items.push({...r,fy:d.getFullYear(),fm:d.getMonth(),away:i}));}
  return items;
}
function savingPlans(){
  const seen={};
  return futurePlans(12).filter(p=>{const k=`${p.id}-${p.fy}-${p.fm}`;if(seen[k])return false;seen[k]=true;return true})
    .map(p=>({...p,needed:Math.max(0,Math.ceil((p.amount-(p.saved||0))/p.away))})).sort((a,b)=>a.away-b.away);
}
function accColor(acc){
  if(!acc)return'var(--bg2)';
  const m={info:'var(--blue-bg)',success:'var(--green-bg)',warning:'var(--amber-bg)',danger:'var(--red-bg)',pink:'var(--pink-bg)',secondary:'var(--bg2)'};
  return m[acc.color]||m.secondary;
}
function accTextColor(acc){
  if(!acc)return'var(--txt2)';
  const m={info:'var(--blue-txt)',success:'var(--green-txt)',warning:'var(--amber-txt)',danger:'var(--red-txt)',pink:'var(--pink-txt)',secondary:'var(--txt2)'};
  return m[acc.color]||m.secondary;
}
function accBorderColor(acc){
  if(!acc)return'var(--border)';
  const m={info:'var(--blue)',success:'var(--green)',warning:'var(--amber)',danger:'var(--red)',pink:'var(--pink)',secondary:'var(--border2)'};
  return m[acc.color]||m.secondary;
}
function chipAcc(acc){
  if(!acc)return'';
  return`<span style="background:${accColor(acc)};color:${accTextColor(acc)};border:1px solid ${accBorderColor(acc)};padding:1px 8px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block">${acc.icon} ${acc.name}</span>`;
}

function generateAlerts(){
  const alerts=[];
  const{inc,exp,inv,bal}=calcMonth(S.viewYear,S.viewMonth,null);
  const savRate=inc>0?bal/inc:0;
  if(bal<0)alerts.push({type:'danger',icon:'⚠️',title:'Mese in rosso',text:`Hai speso ${fmt(Math.abs(bal))} più di quanto hai guadagnato. Il mese prossimo recupera almeno ${fmt(Math.abs(bal))}.`});
  else if(savRate>=0.3)alerts.push({type:'success',icon:'🎯',title:'Ottimo risparmio!',text:`Hai risparmiato il ${(savRate*100).toFixed(0)}% del reddito (${fmt(bal)}). Considera di trasferire ${fmt(Math.round(bal*0.5))} sul conto deposito.`});
  else if(savRate>0&&savRate<0.1&&inc>0)alerts.push({type:'warning',icon:'📉',title:'Risparmio basso',text:`Solo il ${(savRate*100).toFixed(0)}% risparmiato (${fmt(bal)}). Prova a tagliare qualche spesa variabile.`});
  else if(savRate>=0.1&&savRate<0.3&&inc>0)alerts.push({type:'info',icon:'📊',title:'Buon ritmo',text:`Risparmio del ${(savRate*100).toFixed(0)}% (${fmt(bal)}). Stai andando bene!`});
  const recThis=getRecurForMonth(S.viewYear,S.viewMonth);
  if(recThis.length>0){const tot=recThis.reduce((a,r)=>a+r.amount,0);alerts.push({type:'warning',icon:'🗓️',title:'Spese programmate questo mese',text:`${recThis.length} spesa/e per ${fmt(tot)}: ${recThis.map(r=>r.name).join(', ')}.`});}
  savingPlans().slice(0,2).forEach(p=>{if(p.away<=3)alerts.push({type:'warning',icon:'📅',title:`${MO[p.fm]}: ${p.name}`,text:`Tra ${p.away} ${p.away===1?'mese':'mesi'} — ${fmt(p.amount)}. Serve ${fmt(p.needed)}/mese.`});});
  S.goals.forEach(g=>{
    const pct=(g.saved/g.target)*100;const ml=monthsLeft(g.deadline);const dl=daysLeft(g.deadline);
    if(pct>=100){alerts.push({type:'success',icon:'🏆',title:`Obiettivo raggiunto: ${g.name}`,text:`Hai raggiunto ${fmt(g.target)}. Ottimo lavoro!`});return}
    if(dl<=30&&dl>0)alerts.push({type:'danger',icon:'🚨',title:`Urgente: ${g.name}`,text:`${dl} giorni rimasti! Mancano ${fmt(g.target-g.saved)}.`});
    else if(pct<30&&ml<=6)alerts.push({type:'warning',icon:'⚠️',title:`In ritardo: ${g.name}`,text:`${pct.toFixed(0)}% con ${ml} mesi rimasti. Serve ${fmt(Math.ceil((g.target-g.saved)/Math.max(1,ml)))}/mese.`});
  });
  S.accounts.filter(a=>a.isJoint).forEach(a=>{
    const b=accBalance(a.id);
    if(b<0)alerts.push({type:'danger',icon:'👫',title:`Cointestato in negativo`,text:`Il conto ${a.name} è in rosso di ${fmt(Math.abs(b))}. Necessario un versamento.`});
    else if(b<(a.myMonthly+a.partnerMonthly))alerts.push({type:'warning',icon:'👫',title:`Cointestato: saldo basso`,text:`Il conto ${a.name} ha solo ${fmt(b)}. Ricorda i versamenti mensili.`});
  });
  return alerts;
}

function compoundCalc(monthly,rate,years){
  const r=rate/100/12;const n=years*12;
  if(r===0)return{final:monthly*n,invested:monthly*n,gain:0,data:[]};
  const final=monthly*(Math.pow(1+r,n)-1)/r;
  const invested=monthly*n;
  const data=[];
  for(let y=1;y<=years;y++){
    const v=monthly*(Math.pow(1+r,y*12)-1)/r;
    data.push({y,v:Math.round(v),inv:monthly*y*12});
  }
  return{final:Math.round(final),invested:Math.round(invested),gain:Math.round(final-invested),data};
}


// ── AUTO-REGISTRAZIONE ──
function autoRegisterDue(){
  if(!S.settings?.autoRegister) return;
  if(!S.autoRegistered)S.autoRegistered=[];
  // Solo mese corrente REALE — navigare la storia non deve aggiungere transazioni
  const y=now.getFullYear(), m=now.getMonth();
  const todayDay=now.getDate();
  let changed=false;
  getRecurForMonth(y,m).forEach(r=>{
    const key=`${r.id}-${y}-${m}`;
    if(S.autoRegistered.includes(key)) return;
    const day=r.day||1;
    if(day>todayDay) return;
    S.transactions.push({
      id:S.nextId++,
      date:`${y}-${pad(m+1)}-${pad(day)}`,
      type:'expense',category:r.category,
      desc:r.name,amount:r.amount,
      accountId:r.accountId||S.accounts[0]?.id,
      autoReg:true
    });
    S.autoRegistered.push(key);
    changed=true;
  });
  if(changed) saveData();
}

// ── PROIEZIONE 3 MESI ──
function buildProjection(){
  // Media entrate ultimi 3 mesi (escludo mese corrente)
  let avgInc=0;
  for(let i=1;i<=3;i++){
    const d=new Date(S.viewYear,S.viewMonth-i,1);
    avgInc+=calcMonth(d.getFullYear(),d.getMonth(),null).inc;
  }
  avgInc=avgInc/3||0;

  const months=[];
  let runningBal=netWorth();
  for(let i=1;i<=3;i++){
    const d=new Date(S.viewYear,S.viewMonth+i,1);
    const y=d.getFullYear(), m=d.getMonth();
    const recs=getRecurForMonth(y,m);
    const recExp=recs.reduce((s,r)=>s+r.amount,0);
    const jt=S.accounts.filter(a=>a.isJoint).reduce((s,a)=>s+a.myMonthly,0);
    const expectedExp=recExp+jt;
    const expectedSav=Math.max(0,avgInc-expectedExp);
    runningBal+=avgInc-expectedExp;
    months.push({
      y,m,label:`${MO[m].slice(0,3)} ${y}`,
      avgInc:Math.round(avgInc),
      recExp,jt,
      expectedExp:Math.round(expectedExp),
      expectedSav:Math.round(expectedSav),
      projBal:Math.round(runningBal),
      recs
    });
  }
  return months;
}

// ── AZIONI ──

function toggleTab(k,v){
  if(!S.settings)S.settings={tabs:{},autoRegister:true};
  if(!S.settings.tabs)S.settings.tabs={};
  S.settings.tabs[k]=v;
  if(!v&&S.activeTab===k)S.activeTab='overview';
  saveData();render()
}
function toggleAutoReg(v){
  if(!S.settings)S.settings={tabs:{},autoRegister:true};
  S.settings.autoRegister=v;
  saveData();render()
}
function exportData(){
  try{
    var data=JSON.stringify(S,null,2);
    var blob=new Blob([data],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='portafoglio_'+now.toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(e){alert('Errore export: '+e.message);}
}
function importData(){
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json,application/json,text/plain,*/*';
  inp.style.display='none';
  document.body.appendChild(inp);
  inp.onchange=function(e){
    var f=e.target.files[0];
    if(!f)return;
    var rd=new FileReader();
    rd.onload=function(ev){
      try{
        var p=JSON.parse(ev.target.result);
        if(p.accounts&&p.transactions){
          Object.assign(S,p);
          saveData();render();
          alert('Importato!');
        }else{alert('File non valido');}
      }catch(ex){alert('Errore: '+ex.message);}
    };
    rd.readAsText(f);
    document.body.removeChild(inp);
  };
  inp.click();
}
function resetAll(){
  if(!confirm('Sei sicuro? Verranno cancellati TUTTI i dati. Operazione irreversibile.'))return;
  if(!confirm('Ultima conferma: hai esportato il backup JSON?'))return;
  try{localStorage.clear();}catch(ex){}
  try{localStorage.removeItem('pfv4');}catch(ex){}
  // Resetta S direttamente in memoria senza reload
  S.accounts=[];
  S.transactions=[];
  S.recurring=[];
  S.goals=[];
  S.investments=[];
  S.autoRegistered=[];
  S.nextId=1;
  S.viewYear=now.getFullYear();
  S.viewMonth=now.getMonth();
  S.activeTab='overview';
  S.filterAccount='all';
  S.sim={monthly:200,rate:7,years:20};
  S.settings={autoRegister:true,tabs:{overview:true,movements:true,accounts:true,joint:true,transfer:true,projection:true,chart:true,simulator:true,alerts:true,goals:true,calendar:true,investments:true}};
  saveData();
  render();
  alert('Reset completato! App svuotata.');
}
function sT(t){S.activeTab=t;render()}
function pM(){if(S.viewMonth===0){S.viewMonth=11;S.viewYear--}else S.viewMonth--;render()}
function nM(){if(S.viewMonth===11){S.viewMonth=0;S.viewYear++}else S.viewMonth++;render()}
function cT(){S.txForm.type=document.getElementById('ft').value;S.txForm.category=CATS[S.txForm.type][0];render()}
function setFlt(v){S.filterAccount=v;render()}
function goAcc(id){S.filterAccount=id;S.activeTab='movements';render()}
function chAT(){const t=document.getElementById('at').value;S.accForm.type=t;S.accForm.isJoint=(t==='joint');render()}

function updSim(k,v){S.sim[k]=parseFloat(v);const r=compoundCalc(S.sim.monthly,S.sim.rate,S.sim.years);if(simChartInst){simChartInst.data.datasets[0].data=r.data.map(d=>d.inv);simChartInst.data.datasets[1].data=r.data.map(d=>d.v);simChartInst.update('none');}saveData()}

function addTx(){
  const accId=parseInt(document.getElementById('f-acc').value);
  const type=document.getElementById('ft').value,cat=document.getElementById('fc').value,desc=document.getElementById('fd').value,amt=parseFloat(document.getElementById('fa').value);
  if(!amt||amt<=0){alert('Inserisci un importo valido');return}
  const d=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  S.transactions.push({id:S.nextId++,date:d,type,category:cat,desc:desc||cat,amount:amt,accountId:accId});
  if(type==='invest'){const ex=S.investments.find(i=>i.name.toLowerCase()===(desc||cat).toLowerCase());if(ex){ex.invested+=amt;ex.currentValue+=amt}}
  S.txForm={...S.txForm,desc:'',amount:''};saveData();render()
}
function dTx(id){if(!confirm('Eliminare questo movimento?'))return;S.transactions=S.transactions.filter(t=>t.id!==id);saveData();render()}

function addTransfer(){
  const fromId=parseInt(document.getElementById('tr-from').value),toId=parseInt(document.getElementById('tr-to').value),amt=parseFloat(document.getElementById('tr-amt').value),desc=document.getElementById('tr-desc').value;
  if(!amt||amt<=0||fromId===toId){alert('Controlla i dati');return}
  const d=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  S.transactions.push({id:S.nextId++,date:d,type:'transfer',category:'Trasferimento',desc:desc||'Trasferimento',amount:amt,accountId:fromId,toAccountId:toId});
  S.trForm={...S.trForm,amount:''};saveData();render()
}
function quickTr(f,t,a){
  const d=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  S.transactions.push({id:S.nextId++,date:d,type:'transfer',category:'Trasferimento',desc:`Versamento cointestato ${fmt(a)}`,amount:a,accountId:f,toAccountId:t});
  saveData();render()
}
function jtMio(accId){
  const acc=S.accounts.find(a=>a.id===accId);if(!acc)return;
  const from=S.accounts.find(a=>a.type==='checking')||S.accounts[0];
  S.transactions.push({id:S.nextId++,date:`${S.viewYear}-${pad(S.viewMonth+1)}-01`,type:'transfer',category:'Trasferimento',desc:`Mio versamento → ${acc.name}`,amount:acc.myMonthly,accountId:from.id,toAccountId:accId});
  saveData();render()
}
function jtPartner(accId){
  const acc=S.accounts.find(a=>a.id===accId);if(!acc)return;
  S.transactions.push({id:S.nextId++,date:`${S.viewYear}-${pad(S.viewMonth+1)}-01`,type:'income',category:'Altro',desc:`Versamento ${acc.partnerName}`,amount:acc.partnerMonthly,accountId:accId,isPartnerContrib:true});
  saveData();render()
}
function jtEntrambi(accId){jtMio(accId);setTimeout(()=>{jtPartner(accId)},30)}
function addJtExp(accId){
  const desc=document.getElementById('jt-desc').value,cat=document.getElementById('jt-cat').value,amt=parseFloat(document.getElementById('jt-amt').value);
  if(!amt||amt<=0)return;
  S.transactions.push({id:S.nextId++,date:`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,type:'expense',category:cat,desc:desc||cat,amount:amt,accountId:accId});
  saveData();render()
}
function markPaid(id){
  const r=S.recurring.find(r=>r.id===id);if(!r)return;
  const day=r.day||1;
  S.transactions.push({id:S.nextId++,date:`${S.viewYear}-${pad(S.viewMonth+1)}-${pad(day)}`,type:'expense',category:r.category,desc:r.name,amount:r.amount,accountId:r.accountId||S.accounts[0]?.id});
  saveData();render()
}
function addSav(id){const r=S.recurring.find(r=>r.id===id);if(!r)return;const v=parseFloat(document.getElementById('sp-'+id)?.value);if(!v||v<=0)return;r.saved=(r.saved||0)+v;saveData();render()}
function addRec(){
  const name=document.getElementById('rn').value,amt=parseFloat(document.getElementById('ra').value),day=parseInt(document.getElementById('rd')?.value)||1,month=parseInt(document.getElementById('rm').value),recur=document.getElementById('rr').value,cat=document.getElementById('rc').value,accId=parseInt(document.getElementById('r-acc').value);
  if(!name||!amt||amt<=0){alert('Compila nome e importo');return}
  S.recurring.push({id:S.nextId++,name,amount:amt,day,month,recur,category:cat,saved:0,accountId:accId});
  S.recForm={name:'',amount:'',day:1,month:now.getMonth(),recur:'yearly',category:'Trasporti',accountId:S.accounts[0]?.id||1};
  saveData();render()
}
function dRec(id){if(!confirm('Eliminare questa spesa programmata?'))return;S.recurring=S.recurring.filter(r=>r.id!==id);saveData();render()}
function addGoal(){
  const name=document.getElementById('gn').value,type=document.getElementById('gt').value,target=parseFloat(document.getElementById('ga').value),deadline=document.getElementById('gd').value,notes=document.getElementById('gno').value,accId=parseInt(document.getElementById('g-acc').value);
  if(!name||!target||target<=0||!deadline){alert('Compila tutti i campi');return}
  S.goals.push({id:S.nextId++,name,type,target,saved:0,deadline,notes,accountId:accId});
  S.goalForm={name:'',type:'save',target:'',deadline:`${now.getFullYear()+1}-${pad(now.getMonth()+1)}-01`,notes:'',accountId:S.accounts[0]?.id||1};
  saveData();render()
}
function depGoal(id){const g=S.goals.find(g=>g.id===id);if(!g)return;const v=parseFloat(document.getElementById('gd-'+id)?.value);if(!v||v<=0)return;g.saved=Math.min(g.target,g.saved+v);saveData();render()}
function depGoalM(id,m){const g=S.goals.find(g=>g.id===id);if(!g)return;g.saved=Math.min(g.target,g.saved+m);saveData();render()}
function dGoal(id){if(!confirm('Eliminare questo obiettivo?'))return;S.goals=S.goals.filter(g=>g.id!==id);saveData();render()}
function sInv(id){const v=parseFloat(document.getElementById('eiv-'+id).value);if(!v||v<0)return;const inv=S.investments.find(i=>i.id===id);if(inv)inv.currentValue=v;S.editInvId=null;saveData();render()}
function sDv(id){
  const v=parseFloat(document.getElementById('div-'+id).value);if(!v||v<=0)return;
  const inv=S.investments.find(i=>i.id===id);if(inv){
    const d=`${S.viewYear}-${pad(S.viewMonth+1)}-15`;
    inv.dividends.push({date:d,amount:v});
    S.transactions.push({id:S.nextId++,date:d,type:'income',category:'Dividendi',desc:`Dividendo ${inv.name}`,amount:v,accountId:inv.accountId});
  }
  S.editDivId=null;saveData();render()
}
function addCtr(id){
  const inv=S.investments.find(i=>i.id===id);if(!inv)return;
  const d=`${S.viewYear}-${pad(S.viewMonth+1)}-01`;
  S.transactions.push({id:S.nextId++,date:d,type:'invest',category:'ETF',desc:`Contributo ${inv.name}`,amount:inv.monthlyAmount,accountId:inv.accountId});
  inv.invested+=inv.monthlyAmount;inv.currentValue+=inv.monthlyAmount;saveData();render()
}
function addInv(){
  const name=document.getElementById('in').value,val=parseFloat(document.getElementById('iv').value)||0,monthly=parseFloat(document.getElementById('im').value)||0,accId=parseInt(document.getElementById('i-acc').value);
  if(!name){alert('Inserisci il nome');return}
  S.investments.push({id:S.nextId++,name,monthlyAmount:monthly,invested:val,currentValue:val,accountId:accId,dividends:[]});
  if(val>0)S.transactions.push({id:S.nextId++,date:`${S.viewYear}-${pad(S.viewMonth+1)}-01`,type:'invest',category:'ETF',desc:`Apertura ${name}`,amount:val,accountId:accId});
  S.invForm={name:'',monthly:'',val:'',accountId:accId};saveData();render()
}
function dInv(id){if(!confirm('Eliminare questo investimento?'))return;S.investments=S.investments.filter(i=>i.id!==id);saveData();render()}
function addAcc(){
  const name=document.getElementById('an').value,type=document.getElementById('at').value,bal=parseFloat(document.getElementById('ab').value)||0,note=document.getElementById('ano').value;
  if(!name){alert('Inserisci il nome del conto');return}
  const t=ACC_TYPES.find(a=>a.v===type);
  const colors={checking:'info',savings:'success',investment:'warning',cash:'secondary',crypto:'danger',joint:'pink',other:'secondary'};
  const isJoint=(type==='joint');
  const partnerName=isJoint?(document.getElementById('a-partner')?.value||'Partner'):'';
  const myMonthly=isJoint?(parseFloat(document.getElementById('a-my')?.value)||200):0;
  const partnerMonthly=isJoint?(parseFloat(document.getElementById('a-par')?.value)||200):0;
  S.accounts.push({id:S.nextId++,name,type,icon:t?.icon||'🏦',color:colors[type]||'secondary',initialBalance:bal,note,isJoint,partnerName,myMonthly,partnerMonthly});
  S.accForm={name:'',type:'checking',initialBalance:'',note:'',isJoint:false,partnerName:'',myMonthly:200,partnerMonthly:200};
  saveData();render()
}
function dAcc(id){
  if(!confirm('Eliminare questo conto e tutti i movimenti associati?'))return;
  S.accounts=S.accounts.filter(a=>a.id!==id);
  S.transactions=S.transactions.filter(t=>t.accountId!==id&&t.toAccountId!==id);
  saveData();render()
}
function setAccC(id,c){const a=S.accounts.find(a=>a.id===id);if(a)a.color=c;saveData();render()}
function setAccI(id,i){const a=S.accounts.find(a=>a.id===id);if(a)a.icon=i;saveData();render()}

// Registra service worker per PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
    .then(function(r){ console.log('SW ok'); })
    .catch(function(e){ console.log('SW err', e); });
}
render();
</script>
</body>
